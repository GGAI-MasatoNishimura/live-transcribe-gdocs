<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Transcribe</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <main class="panel">
    <h1 class="title">出力先ドキュメント</h1>
    <p class="guide">
      共有は「リンクを知っている全員が編集可」がおすすめです。文字起こしはドキュメントの末尾にだけ足され、すでに書いた行をシステムが上書きすることはありません。人間の補足は <code class="code-inline">[補足]</code> などで書けます（要件どおり）。
    </p>
    <label class="label" for="docUrl">Google ドキュメント URL</label>
    <input
      id="docUrl"
      class="input"
      type="url"
      placeholder="https://docs.google.com/document/d/.../edit"
      autocomplete="off"
      spellcheck="false"
    />
    <p id="docIdHint" class="hint" hidden></p>
    <div class="actions">
      <button id="btnStart" type="button" class="btn btn-primary">記録開始</button>
      <button id="btnStop" type="button" class="btn btn-secondary" disabled>記録停止</button>
    </div>
    <p id="status" class="status" role="status">待機中</p>
  </main>
  <script src="popup.js"></script>
</body>

</html>
